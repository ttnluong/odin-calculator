<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/cfbd2d9ddc.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
    <div id="calculator">
        <div id="screen">
            <div id="display"></div>
        </div>
        <div id="buttons">
            <button class="clear" id="clear" value="CE">CE</button>
            <button class="delete" id="delete" value="%"><i class="fa-solid fa-delete-left"></i></button>
            <button class="number" id="seven" value="7">7</button>
            <button class="number" id="eight" value="8">8</button>
            <button class="number" id="nine" value="9">9</button>
            <button class="operator" id="divider" value="/">/</button>
            <button class="number" id="four" value="4">4</button>
            <button class="number" id="five" value="5">5</button>
            <button class="number" id="six" value="6">6</button>
            <button class="operator" id="times" value="x">x</button>
            <button class="number" id="one" value="1">1</button>
            <button class="number" id="two" value="2">2</button>
            <button class="number" id="three" value="3">3</button>
            <button class="operator" id="minus" value="-">-</button>
            <button class="number" id="zero" value="0">0</button>
            <button class="dot" id="dot" value=".">.</button>
            <button class="equal" id="equal" value="=">=</button>
            <button class="operator" id="add" value="+">+</button>
        </div>
    </div>
    </div>

</body>
</html>
